<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Shopping Cart - Fuel &amp; Auto Parts</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between p-4 max-w-md mx-auto w-full">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Shopping Cart</h1>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block text-red-500">delete_sweep</span>
</button>
</div>
</header>
<!-- Cart Content -->
<main class="flex-1 overflow-y-auto p-4 max-w-md mx-auto w-full space-y-6">
<!-- Cart Items List -->
<div class="space-y-4">
<!-- Item 1: Petrol -->
<div class="flex gap-4 bg-white dark:bg-slate-900/50 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="h-24 w-24 rounded-lg bg-slate-200 dark:bg-slate-800 flex-shrink-0 overflow-hidden relative">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Nozzle dispensing 95 octane premium petrol" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB0DRhHyUoTjNv11_dPFotTsIxfLixhFdCxiuJkgcNC7Ixtmdr6osHonzUVKazg4iYpmUnEPEUTX5xZ7Me0nqDv1yMSV2dIn_1cD50_1jzKkcc4Tw6XqVdyPPjrF-OtARFjNo2PSSFCYHsILgxb6hPhKJnC4XYY2sn5dYMaOs_4Lsk-B-RqhsY01_OxiigzLKiO1iECf9pprkFrIFvUYHpEOX2iBWn6rcXrIrNAEc1wvZl-b8XPx5lz5JB3i9lF0OHIPeQgKODlg4E')"></div>
</div>
<div class="flex flex-col justify-between flex-1">
<div>
<div class="flex justify-between items-start">
<h3 class="font-semibold text-base">Petrol 95 Octane</h3>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<p class="text-primary text-sm font-medium">$1.50 / Liter</p>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-2 py-1">
<button class="w-7 h-7 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined text-base">remove</span>
</button>
<span class="w-10 text-center font-semibold text-sm">50</span>
<button class="w-7 h-7 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined text-base text-primary font-bold">add</span>
</button>
</div>
<span class="font-bold text-slate-900 dark:text-slate-100 text-lg">$75.00</span>
</div>
</div>
</div>
<!-- Item 2: Battery -->
<div class="flex gap-4 bg-white dark:bg-slate-900/50 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="h-24 w-24 rounded-lg bg-slate-200 dark:bg-slate-800 flex-shrink-0 overflow-hidden relative">
<div class="absolute inset-0 bg-cover bg-center" data-alt="High performance heavy duty car battery" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDFAPjd9wYYxc72OQY9Ks_LcvHqsykgfmac0yuyS9Dj08f8QCsm5ac_y6N2u2wXKUhnynud3KXmFeyvrmRZWNSRDsuN2J9QH3t7BGp9Rm7INmK-2H21rokfI3HrlIp4o8xQHJgFbrvKvd7xp6HoyEFiIKoL70SD3rROptWu9nzMDCiN3WeO3wKuNehZ930oY4Mt7ghH5BZAwkJcBVRyIzX6M7pY1s67femVm8nQxwOwY68JJWOYPNOV5-Igonopc_7m8U_b-9Yy3wY')"></div>
</div>
<div class="flex flex-col justify-between flex-1">
<div>
<div class="flex justify-between items-start">
<h3 class="font-semibold text-base">DieHard Platinum</h3>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs">Group Size 35 • 3yr Warranty</p>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-2 py-1">
<button class="w-7 h-7 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined text-base">remove</span>
</button>
<span class="w-10 text-center font-semibold text-sm">1</span>
<button class="w-7 h-7 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined text-base text-primary font-bold">add</span>
</button>
</div>
<span class="font-bold text-slate-900 dark:text-slate-100 text-lg">$199.99</span>
</div>
</div>
</div>
</div>
<!-- Order Summary Section -->
<div class="bg-primary/5 dark:bg-primary/10 rounded-xl p-5 border border-primary/20 space-y-3">
<h2 class="font-bold text-sm uppercase tracking-wider text-primary/80">Order Summary</h2>
<div class="space-y-2">
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Subtotal</span>
<span class="font-medium">$274.99</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Delivery Fee</span>
<span class="font-medium text-green-500">FREE</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Taxes &amp; Fees</span>
<span class="font-medium">$22.00</span>
</div>
<div class="pt-2 border-t border-slate-200 dark:border-slate-800 flex justify-between items-end">
<span class="font-bold text-base">Total Amount</span>
<span class="font-bold text-2xl text-primary">$296.99</span>
</div>
</div>
</div>
<!-- Promo Code -->
<div class="relative group">
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 focus:ring-primary focus:border-primary" placeholder="Promo code" type="text"/>
<button class="absolute right-2 top-2 bottom-2 px-4 bg-slate-100 dark:bg-slate-800 text-primary font-bold text-sm rounded-lg hover:bg-primary hover:text-white transition-all">Apply</button>
</div>
</main>
<!-- Footer Action -->
<footer class="p-4 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 max-w-md mx-auto w-full sticky bottom-0">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2">
<span>Proceed to Checkout</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Bottom Navigation Mockup -->
<nav class="flex justify-around items-center pt-4 mt-2">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">local_gas_station</span>
<span class="text-[10px] font-medium">Fuel</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">shopping_cart</span>
<span class="text-[10px] font-medium">Cart</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</nav>
</footer>
</body></html>

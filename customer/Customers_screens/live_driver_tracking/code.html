<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top App Bar -->
<div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-gradient-to-b from-background-dark/80 to-transparent">
<button class="flex size-10 items-center justify-center rounded-full bg-slate-800/80 text-slate-100 backdrop-blur-md">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-slate-100 text-sm font-bold uppercase tracking-wider">Tracking Order</h2>
<p class="text-primary text-xs font-medium">Arriving in 12 mins</p>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-slate-800/80 text-slate-100 backdrop-blur-md">
<span class="material-symbols-outlined">help</span>
</button>
</div>
<!-- Map Area (Simulation) -->
<div class="relative flex-1 bg-slate-800 overflow-hidden">
<!-- Mock Map Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-60 grayscale brightness-50" data-alt="Dark stylized city map with navigation routes" data-location="San Francisco" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDlwmLx7t9k5eBXgZD_XVn_bgC1be65LUD11xKLvytYioUTe3UIcc8L52rrH0iWQOCSgQt3h-0al6H7_nHmbShDPy9rvxDnXv3iCCtIhDxrw_xnXwA3VdBPkQQZ391EX_fZ_AFs2HQknRekxEkd1mX2BgXuvjYWnnk1JWzMveJCp_eQSvwNf00o2iasJI3TgHqsCQcxYfEli2gd5dK3sbucOoh6KvMuhhQgAbeVuGqRNdTwuDG7T0kUmZf8lM35lgE1kJxSu5GvKZw");'>
</div>
<!-- Route Path (SVG Overlay) -->
<svg class="absolute inset-0 z-10 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<path class="opacity-80" d="M 200 600 Q 250 500 150 400 T 200 200" fill="none" stroke="#256af4" stroke-dasharray="12 8" stroke-linecap="round" stroke-width="6"></path>
<!-- Destination Marker -->
<circle cx="200" cy="200" fill="#256af4" r="8"></circle>
<circle class="opacity-20" cx="200" cy="200" fill="#256af4" r="16"></circle>
</svg>
<!-- Driver Icon (Positioned on Route) -->
<div class="absolute z-20 top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2">
<div class="relative flex flex-col items-center">
<div class="bg-primary p-2 rounded-full shadow-lg shadow-primary/40 border-2 border-slate-100">
<span class="material-symbols-outlined text-white text-3xl">local_shipping</span>
</div>
<div class="mt-2 px-2 py-1 bg-slate-900/90 rounded text-[10px] font-bold text-white uppercase tracking-tighter backdrop-blur-sm">
                    En Route
                </div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-2">
<button class="flex size-10 items-center justify-center rounded-lg bg-slate-900/90 text-slate-100 shadow-xl border border-slate-700/50 backdrop-blur-md">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-10 items-center justify-center rounded-lg bg-slate-900/90 text-slate-100 shadow-xl border border-slate-700/50 backdrop-blur-md">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="mt-4 flex size-10 items-center justify-center rounded-lg bg-primary text-white shadow-xl shadow-primary/20">
<span class="material-symbols-outlined fill-icon">navigation</span>
</button>
</div>
</div>
<!-- Bottom Sheet Container -->
<div class="relative z-30 bg-background-dark rounded-t-xl shadow-[0_-8px_30px_rgb(0,0,0,0.5)] border-t border-slate-800">
<!-- Handle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-700"></div>
</div>
<!-- Content -->
<div class="px-6 pb-8">
<!-- Delivery Info Header -->
<div class="flex items-center justify-between mb-6">
<div class="flex items-center gap-4">
<div class="size-16 rounded-full border-2 border-primary p-0.5">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="Professional delivery driver profile photo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC61Mp7ROfe_HPL4hfL-GTaj7UHUs51CxzmbrGLww3lCaYWqGJdARBLnKsmnKmMEasJ3XrtxuWaGF3pJprF6SSqjR797F_koqf3yRAfWHss2gZuh1WNnVwPJtvAgvJ6sN0ygA2vtMwNGmAGLwIPZrvDATJB9Jfu2aor0ySNHo60MMILj7oo9GiO4GH_IWYlShVwJaIY1O9WmkSa8EZJfo837Mh9R8AqleJjAdE4Bmd9jm6KfhroS3DVAgxbG8EB_wE2_xknsJbULmE");'></div>
</div>
<div>
<h3 class="text-slate-100 text-xl font-bold">Marcus Chen</h3>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-amber-400 text-sm fill-icon">star</span>
<span class="text-slate-300 text-sm font-medium">4.9</span>
<span class="text-slate-500 text-sm ml-1">(2.4k deliveries)</span>
</div>
</div>
</div>
<div class="text-right">
<p class="text-primary text-2xl font-black">12</p>
<p class="text-slate-500 text-[10px] font-bold uppercase">Minutes</p>
</div>
</div>
<!-- Vehicle & Order Details -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 flex items-center gap-3">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">local_shipping</span>
</div>
<div>
<p class="text-slate-500 text-[10px] font-bold uppercase leading-none mb-1">Vehicle</p>
<p class="text-slate-100 text-sm font-semibold">Tanker #882</p>
</div>
</div>
<div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 flex items-center gap-3">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">gas_meter</span>
</div>
<div>
<p class="text-slate-500 text-[10px] font-bold uppercase leading-none mb-1">Fuel Type</p>
<p class="text-slate-100 text-sm font-semibold">91 Octane</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-100 font-bold py-4 rounded-xl transition-colors border border-slate-700">
<span class="material-symbols-outlined">chat_bubble</span>
                    Message
                </button>
<button class="flex-1 flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-colors">
<span class="material-symbols-outlined fill-icon">call</span>
                    Call Driver
                </button>
</div>
<!-- Order Progress Bar (Subtle) -->
<div class="mt-8">
<div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-2">
<span>Order Placed</span>
<span class="text-primary">Out for Delivery</span>
<span>Arrived</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 75%;"></div>
</div>
</div>
</div>
</div>
</div>
</body></html>

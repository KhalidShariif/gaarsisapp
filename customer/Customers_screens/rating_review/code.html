<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Rate Your Delivery</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Main Container -->
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-4 sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Feedback</h1>
<div class="w-10"></div> <!-- Spacer for alignment -->
</header>
<!-- Content -->
<main class="flex-1 p-6 flex flex-col gap-8">
<!-- Delivery Info Summary -->
<div class="text-center space-y-2">
<h2 class="text-2xl font-extrabold tracking-tight">How was your delivery?</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Order #FL-8829 delivered at 2:14 PM</p>
</div>
<!-- Global Rating -->
<section class="space-y-4">
<h3 class="text-center text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Overall Experience</h3>
<div class="flex justify-center gap-2">
<button class="group">
<span class="material-symbols-outlined text-4xl text-primary fill-1">star</span>
</button>
<button class="group">
<span class="material-symbols-outlined text-4xl text-primary fill-1">star</span>
</button>
<button class="group">
<span class="material-symbols-outlined text-4xl text-primary fill-1">star</span>
</button>
<button class="group">
<span class="material-symbols-outlined text-4xl text-primary fill-1">star</span>
</button>
<button class="group">
<span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-700">star</span>
</button>
</div>
</section>
<!-- Detailed Ratings -->
<section class="space-y-6">
<!-- Driver Rating -->
<div class="bg-slate-100 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-3">
<div class="h-10 w-10 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-800">
<img class="h-full w-full object-cover" data-alt="Portrait of a friendly delivery driver" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHZzU4WTR3cpuzxtVnaQIDFNiWsqHdMoKWTJ0bny2CRrFjhY-yc68Ub0JRgilFuX0N3e6SgCJdE86hTIqUNKYwBz7kdOC5bDhWQ1wYgxuvI96kXCa1TcMcGzkuk1a_XfNxAO_eqDWNb702lOYArX9lGVzrSR6R97GmKCM4qbvAnXnGrlcW9LN3MkhJm9xUuV45_Sw79zMIiCRCzsZQfXgQBn32KqxXFAc5RBHBhuDIy5c9ZFh-fM_cgKdf8QeKsGfQA_ywV-NfkNo"/>
</div>
<div>
<p class="font-bold text-sm">Rate Marcus</p>
<p class="text-xs text-slate-500">Your Delivery Pro</p>
</div>
</div>
<div class="flex gap-1">
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
</div>
</div>
</div>
<!-- Service Rating -->
<div class="bg-slate-100 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-3">
<div class="h-10 w-10 flex items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">local_gas_station</span>
</div>
<div>
<p class="font-bold text-sm">Rate Service</p>
<p class="text-xs text-slate-500">App &amp; Fuel Quality</p>
</div>
</div>
<div class="flex gap-1">
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-primary">star</span>
<span class="material-symbols-outlined text-xl text-slate-300 dark:text-slate-700">star</span>
</div>
</div>
</div>
</section>
<!-- Feedback Text Area -->
<section class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1" for="feedback">Any additional comments?</label>
<textarea class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none" id="feedback" placeholder="Tell us about your experience..." rows="4"></textarea>
<div class="flex flex-wrap gap-2 pt-2">
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium hover:bg-primary/10 hover:border-primary/30 transition-colors">On time delivery</button>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium hover:bg-primary/10 hover:border-primary/30 transition-colors">Safe handling</button>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium hover:bg-primary/10 hover:border-primary/30 transition-colors">Professional</button>
</div>

</main>
<!-- Footer / Submit -->
<footer class="p-6 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
<span>Submit Review</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">send</span>
</button>
<p class="text-center text-[10px] text-slate-500 dark:text-slate-600 mt-4 px-8 uppercase tracking-widest">
                By submitting you agree to our terms of service
            </p>
</footer>
</div>
<!-- Rating Distribution Style (Component-like but tailored) -->
<div class="hidden">
<!-- Hidden reference for styling sync if needed -->
<div class="flex h-2 flex-1 overflow-hidden rounded-full bg-slate-200 dark:bg-slate-800">
<div class="rounded-full bg-primary" style="width: 80%;"></div>
</div>
</div>

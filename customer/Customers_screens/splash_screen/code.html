<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fuel Delivery App - Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header/Top Bar -->
<div class="flex items-center p-6 justify-between z-10">
<div class="flex items-center gap-2">
<div class="p-2 bg-primary rounded-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1">local_gas_station</span>
</div>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white uppercase">SwiftFuel</span>
</div>
<div class="flex gap-4">
<button class="text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<!-- Hero Content Wrapper -->
<div class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- Hero Image Section -->
<div class="@container w-full max-w-lg mb-8">
<div class="@[480px]:px-4">
<div class="w-full aspect-square bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-3xl shadow-2xl border-4 border-primary/20" data-alt="Modern sleek fuel delivery truck driving on a clean highway" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC17TgRF-PvZMHs7j0PUYquvG4b1LmD2QyBrpW-cEM1daGUwYr0AgoU_CmAr61ry8q5O1LjUbBe29bjIbswNArR8DKoG8fAJS8Xw4rPMxPqqLajM_i8ihuuzxv-zg73vnVWpobiGljUlLbPTUlMRNQOTXNchTV2Q990F8UI7k-b9jpKNbbXd_cX_6K43btfzoI3Q0srUHX54o0dgr75X-EjjkNiif9rcta_YxZCiag-LVjee_bH9qI8kQw6Wocn-9CZlEX4el1Se_A");'>
<!-- Gradient Overlay for visual depth -->
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 via-transparent to-transparent"></div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="max-w-md text-center z-10">
<h1 class="text-slate-900 dark:text-white tracking-tight text-4xl font-extrabold leading-tight mb-4">
                    Fuel at your <span class="text-primary">doorstep</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium leading-relaxed px-4">
                    The ultimate fuel and spare parts delivery app. Rapid service, anytime, anywhere.
                </p>
</div>
<!-- Loading/Progress Area -->
<div class="w-full max-w-xs mt-12 px-4">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<p class="text-primary text-sm font-semibold uppercase tracking-widest">Starting engine</p>
<span class="text-slate-400 text-xs">85%</span>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full rounded-full bg-primary shadow-[0_0_15px_rgba(37,106,244,0.5)]" style="width: 85%;"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Graphic/Footer -->
<div class="p-8 flex justify-center gap-8 opacity-40">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">speed</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Fast Delivery</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Secure Pay</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">build</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Spare Parts</span>
</div>
</div>
<!-- Decorative Background Element -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
